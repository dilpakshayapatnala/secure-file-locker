<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:8px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:#00ffc3;
border:none;
border-radius:5px;
cursor:pointer;
}

.rules{
font-size:12px;
color:gray;
}

</style>

</head>

<body>

<div class="box">

<h2>Signup</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<div style="position:relative">

<input type="password" name="password" id="password" placeholder="Password" required>

<span onclick="togglePassword()" 
style="position:absolute;right:10px;top:10px;cursor:pointer">👁</span>

</div>

<p class="rules">
Password must contain:
<br>• Minimum 8 characters
<br>• 1 uppercase letter
<br>• 1 lowercase letter
<br>• 1 number
<br>• 1 special character
</p>

<button type="submit">Signup</button>

</form>

<br>

<a href="/login">Already have account</a>

</div>

<script>

function togglePassword(){

let p=document.getElementById("password")

if(p.type==="password"){
p.type="text"
}
else{
p.type="password"
}

}

</script>

</body>
</html>
